<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-6">
            <h2><i class="bi bi-hdd-rack"></i> Daftar Perangkat</h2>
            <p class="text-muted">Seluruh perangkat inventaris</p>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div id="device-table-container" class="table-responsive"></div>
        </div>
    </div>
</div>

<script id="data-devices" type="application/json">[]</script>
<script>
initPublicTable({
    containerId: "device-table-container",
    data: JSON.parse(document.getElementById("data-devices").textContent),
    groupBy: ["usage_type", "category_name", "device_type_name"],
    columns: [
        { field: "asset_code", label: "Asset Code", sortable: true,
          render: function(v) { return '<code>' + v + '</code>'; } },
        { field: "serial_number", label: "Serial Number", sortable: true },
        { field: "condition", label: "Kondisi", sortable: true, filterable: true,
          render: function(v) {
              var badge = {normal: "success", rusak: "danger", warning: "warning"}[v] || "secondary";
              var label = {normal: "Normal", rusak: "Rusak", warning: "Warning"}[v] || v;
              return '<span class="badge bg-' + badge + '">' + label + '</span>';
          }},
        { field: "location", label: "Lokasi", sortable: true },
        { field: "detail", label: "", sortable: false,
          render: function(v, r) { return '<a href="' + PUBLIC_BASE_PATH + '/devices/detail/' + (r.asset_code).toLowerCase() + '.html" class="btn btn-sm btn-info"><i class="bi bi-eye"></i></a>'; } }
    ],
    searchFields: ["asset_code", "device_type_name", "category_name", "serial_number", "location"],
    pageSize: 25
});
</script>
